name: Deploy to VPS

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            cd /root/directors-eye
            git pull origin main
            npm run build
            # Sync dist/ to Caddy static root
            rm -rf /var/www/directors-eye/*
            cp -r dist/* /var/www/directors-eye/
            # Kill old workers & restart backend
            pkill -f "directors-eye/backend/venv/bin/python" 2>/dev/null || true
            sleep 1
            cd backend && nohup venv/bin/python main.py > /var/log/directors-eye.log 2>&1 &
